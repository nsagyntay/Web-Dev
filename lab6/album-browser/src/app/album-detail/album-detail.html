<div class="container">
  <h2>Album Details</h2>

  <div *ngIf="album" class="detail-card">
    <p><strong>ID:</strong> {{ album.id }}</p>
    <p><strong>User ID:</strong> {{ album.userId }}</p>

    <div class="edit-row">
      <input [(ngModel)]="album.title">
      <button (click)="save()">Save</button>
    </div>

    <div class="buttons">
      <a [routerLink]="['/albums', album.id, 'photos']">View Photos</a>
      <button (click)="goBack()">Back</button>
    </div>
  </div>
</div>
